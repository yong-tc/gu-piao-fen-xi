name: 每日A股智能扫描

on:
  schedule:
    # 工作日北京时间 15:10（收盘后）运行，UTC时间 7:10
    - cron: '10 7 * * 1-5'
  workflow_dispatch:   # 支持手动触发

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行扫描脚本
        run: python scanner.py
        env:
          MIN_SCORE: ${{ secrets.MIN_SCORE }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          HISTORY_DAYS: ${{ secrets.HISTORY_DAYS }}
      
      - name: 上传扫描结果（可选）
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: |
            *.csv
            *.log
          retention-days: 7
