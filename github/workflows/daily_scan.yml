name: 每日A股扫描

on:
  # 1. 定时任务：每天北京时间16:30运行
  schedule:
    - cron: '30 8 * * *'
  
  # 2. 手动触发（保留）
  workflow_dispatch:
  
  # 3. 代码推送时立即触发（新增！让你今天就能跑）
  push:
    branches: [main]
    paths:
      - 'scanner.py'
      - '.github/workflows/daily_scan.yml'
  
  # 4. 仓库创建时立即触发（首次部署）
  create:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare pandas numpy
      
      - name: 运行扫描脚本
        run: python scanner.py
      
      - name: 上传结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --quiet && git diff --staged --quiet || git commit -m "每日扫描结果 $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: 保存结果作为Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: results/
          retention-days: 30
